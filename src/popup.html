<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YouTube Ad Speedup</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <h1>Ad speed</h1>
      <div class="speed-options" role="group" aria-label="Ad playback speed">
        <button type="button" data-speed="4">4x</button>
        <button type="button" data-speed="8">8x</button>
        <button type="button" data-speed="16">16x</button>
      </div>
      <p id="status" aria-live="polite"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
